name: gym_os
description: GymOS - AI-Driven Gym & Member Management Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.2
  
  # Navigation
  go_router: ^14.6.2
  
  # Charts
  fl_chart: ^0.70.2
  
  # YouTube Player
  youtube_player_flutter: ^9.1.1
  
  # Image Picker
  image_picker: ^1.1.2
  
  # Local Storage
  shared_preferences: ^2.3.3
  
  # UI Enhancements
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  
  # Icons
  flutter_svg: ^2.0.10+1
  
  # Animations
  lottie: ^3.1.3
  
  # Datetime formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/mock_data/
    - assets/images/
